apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: thread-lens
spec:
  selector:
    app: client
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: thread-lens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: thread-lens-client:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
