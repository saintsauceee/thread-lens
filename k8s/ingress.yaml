apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thread-lens-ingress
  namespace: thread-lens
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  rules:
    - host: thread-lens.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: research
                port:
                  number: 8000
          - path: /research
            pathType: Prefix
            backend:
              service:
                name: research
                port:
                  number: 8000
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: research
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 3000
