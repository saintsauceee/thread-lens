name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-client:
    name: Lint client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  lint-research:
    name: Lint research
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --directory apps/research ruff check
