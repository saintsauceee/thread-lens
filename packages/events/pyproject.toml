[project]
name = "thread-lens-events"
version = "0.1.0"
description = "Redis pub/sub event relay for Thread Lens services"
requires-python = ">=3.11"
dependencies = [
    "redis[hiredis]>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thread_lens_events"]
