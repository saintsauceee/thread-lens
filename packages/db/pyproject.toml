[project]
name = "thread-lens-db"
version = "0.1.0"
description = "Shared database layer for Thread Lens services"
requires-python = ">=3.11"
dependencies = [
    "asyncpg>=0.30.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thread_lens_db"]
